<!DOCTYPE html> 																	<!-- Define que o documento usa HTML5 -->
<html lang="en"> 																	<!-- Inicia o HTML e define o idioma como inglês -->
<head> 																				<!-- Cabeçalho da página: configurações e links externos -->
	<meta charset="UTF-8"> 															<!-- Define codificação de caracteres UTF-8 -->
	<title>Calculadora simples usando Javascript</title> 							<!-- Título exibido na aba do navegador -->
	<link href="style.css" rel="stylesheet"> 										<!-- Importa o arquivo CSS externo -->
	<style>
      .back-btn {
      display: inline-block;                                                         /* Faz o link se comportar como um botão */
      margin: 20px;                                                                  /* Espaçamento ao redor do botão */
      padding: 10px 20px;                                                            /* Espaçamento interno (aumenta o tamanho do botão) */
      background: #000;                                                            /* Cor de fundo preta */
      color: #fff;                                                                 /* Texto branco */
      text-decoration: none;                                                         /* Remove o sublinhado típico de links */
      border-radius: 6px;                                                            /* Bordas arredondadas */
      }
      .back-btn:hover { background: #222; }                                        /* opcional: efeito hover */
    </style>
</head>
<body> 																				<!-- Corpo da página, tudo visível ao usuário fica aqui -->
	<a href="../index.html" class="back-btn">← Voltar</a>							<!-- Aciona botão voltar -->
	<div class="wrapper"> 															<!-- Div usada como contêiner principal para estilos -->
		<h2>Calculadora Simples</h2> 												<!-- Título da calculadora -->
		<input id="num-one" name="num-one" type="text"> 							<!-- Campo de texto para o primeiro número -->
        <input id="num-two" name="num-two" type="text"> 							<!-- Campo de texto para o segundo número -->
		<br> 																		<!-- Quebra de linha -->
		<br>
		<input checked id="box1" name="sign-area" type="radio" value="add"> 		<!-- Botão já selecionado por padrão, representa soma - BOTÕES DE OPERAÇÃO (RADIO BUTTONS) -->
		<b>+</b> 																	<!-- Símbolo exibido ao lado do botão -->
		<input id="box2" name="sign-area" type="radio" value="subtract"> 			<!-- Botão de subtração -->
		<b>-</b> 																	<!-- Símbolo da operação -->
		<input id="box3" name="sign-area" type="radio" value="multiply"> 			<!-- Botão de multiplicação -->
		<b>*</b> 																	<!-- Símbolo da operação -->
		<input id="box4" name="sign-area" type="radio" value="divide"> 				<!-- Botão de divisão -->
		<b>/</b> 																	<!-- Símbolo da operação -->
		<br> 																		<!-- Quebra de linha -->
		<br> 
        <button onclick="outcome()" type="button">calcular</button> 				<!-- Botão que executa a função outcome() no JavaScript ao ser clicado -->
		<h1 id="resultArea"></h1>													<!-- Área onde o resultado será exibido pelo JavaScript -->
	</div> 																			<!-- Fim do contêiner wrapper -->
	<script src="index.js"></script> 												<!-- Importa o arquivo JavaScript com a lógica da calculadora -->
</body>
</html>
